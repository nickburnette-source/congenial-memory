version: '3.8'

services:
  app:
    build: .
    ports:
      - "8501:8501"
    environment:
      - OLLAMA_HOST=http://host.docker.internal:11434
      - MODEL_NAME=llama3.2          # Change to whatever model you have pulled in host Ollama
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./app:/app
      - ./data:/app/data             # Persist SQLite DB + any agent outputs
    stdin_open: true
    tty: true