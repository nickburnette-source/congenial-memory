services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    volumes:
      - ollama_models:/root/.ollama
    ports:
      - "11434:11434"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]

  mssql:
    image: mcr.microsoft.com/azure-sql-edge:1.0.7
    platform: linux/arm64/v8  # Native ARM64
    container_name: mssql
    environment:
      ACCEPT_EULA: 1
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD}
      MSSQL_PID: Developer
    ports:
      - "1433:1433"
    volumes:
      - mssql_data:/var/opt/mssql
      - /home/blakecburnette/Desktop/waterbot/congenial-memory/backups:/backups:ro

  init-db:  # One-time restore (emulated AMD64)
    image: mcr.microsoft.com/mssql-tools:latest
    platform: linux/amd64
    depends_on:
      - mssql
    environment:
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD}
      MSSQL_DB: ${MSSQL_DB}
      BACKUP_FILE: ${BACKUP_FILE}
      LOGICAL_DATA_FILE: ${LOGICAL_DATA_FILE}
      LOGICAL_LOG_FILE: ${LOGICAL_LOG_FILE}
    command: >
      sh -c "sleep 30 && /opt/mssql-tools/bin/sqlcmd -S mssql -U sa -P $$MSSQL_SA_PASSWORD -Q 'RESTORE DATABASE $$MSSQL_DB FROM DISK=\"$$BACKUP_FILE\" WITH MOVE \"$$LOGICAL_DATA_FILE\" TO \"/var/opt/mssql/data/$$MSSQL_DB.mdf\", MOVE \"$$LOGICAL_LOG_FILE\" TO \"/var/opt/mssql/data/$$MSSQL_DB.ldf\", REPLACE;'"

  agent-app:
    build: .
    container_name: agent-app
    depends_on:
      - ollama
      - mssql
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - MSSQL_HOST=mssql
      - MSSQL_USER=${MSSQL_READONLY_USER}
      - MSSQL_PASSWORD=${MSSQL_READONLY_PASSWORD}
      - MSSQL_DB=${MSSQL_DB}
    ports:
      - "8501:8501"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]

volumes:
  ollama_models:
  mssql_data: