version: '3.8'

services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
    runtime: nvidia          # DGX Spark friendly (no deploy block)
    restart: unless-stopped
    stdin_open: true
    tty: true

  app:
    build: .
    ports:
      - "8501:8501"
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - MODEL_NAME=llama3.2:1b     # tiny & fast for testing on DGX Spark
    depends_on:
      - ollama
    volumes:
      - ./app:/app
      - ./data:/app/data
    stdin_open: true
    tty: true

volumes:
  ollama_data: